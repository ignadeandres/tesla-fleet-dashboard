server {
    listen 80;
    server_name YOUR_SUBDOMAIN.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_SUBDOMAIN.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/YOUR_SUBDOMAIN.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_SUBDOMAIN.yourdomain.com/privkey.pem;

    # Tesla Fleet API public key — must be served over HTTPS, no auth required
    location = /.well-known/appspecific/com.tesla.3p.public-key.pem {
        alias /etc/nginx/tesla-keys/public-key.pem;
        default_type "application/x-pem-file";
    }

    location /graphql {
        proxy_pass http://backend:4000/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Tesla OAuth login/callback redirects — handled by the backend, not the SPA
    location /auth/ {
        proxy_pass http://backend:4000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
